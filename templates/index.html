<!DOCTYPE html>
<html>
<head>
    <title>PDF Malware Analyzer</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            background: #161b22;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
            color: #58a6ff;
        }

        input[type="file"] {
            margin: 15px 0;
            color: white;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #238636;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2ea043;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>PDF Malware Analyzer 🚀</h1>

    <form action="/analyze" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required><br>
        <button type="submit">Analyze</button>
    </form>

</div>

</body>
</html>
